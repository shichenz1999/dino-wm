defaults:
  - _self_
  - task: baseline       # task=avoid_goal bundles variant/objective.invert/success.mode
  - planner: mpc_cem     # planner is a config GROUP -> `planner=gd` REPLACES it (no merge leftover)
  # - override hydra/launcher: submitit_slurm

hydra:
  run:
    dir: ${results_base_path}/${env_name}/eval/${replace_slash:${ckpt_id}}/${setting}/${variant_path:${variant_type},${variant}}/${now:%Y%m%d%H%M%S}
  sweep:
    dir: ${results_base_path}/${env_name}/eval/${replace_slash:${ckpt_id}}/${setting}/${variant_path:${variant_type},${variant}}/${now:%Y%m%d%H%M%S}
    subdir: ${hydra.job.num}
  # launcher:
  #   submitit_folder: ${hydra.sweep.dir}/.submitit/%j
  #   nodes: 1
  #   tasks_per_node: 1
  #   cpus_per_task: 16
  #   mem_gb: 256
  #   gres: "gpu:h100:1"
  #   qos: "explore"
  #   timeout_min: 720
  #   setup: ["export DEBUGVAR=$(scontrol show hostnames $SLURM_JOB_NODELIST)",
  #           export MASTER_ADDR="$(scontrol show hostnames $SLURM_JOB_NODELIST | head -n 1)",
  #           "export MASTER_PORT=$(for port in $(shuf -i 30000-65500 -n 20); do if [[ $(netstat -tupln 2>&1 | grep $port | wc -l) -eq 0 ]] ; then echo $port; break; fi; done;)",]

# model to load for planning
ckpt_base_path: ./checkpoints # put absolute path here. Checkpoint loaded from ${ckpt_base_path}/${env_name}/${ckpt_id}
results_base_path: ../results      # plan outputs go to ${results_base_path}/${env_name}/eval/${ckpt_id}/...
env_name: null
ckpt_id: null
model_epoch: latest

seed: 99
n_evals: 50 
goal_source: 'random_state'
goal_H: 5 
n_plot_samples: 10

debug_dset_init: False

# Planner-search trace: records the full CEM population (or GD iterate) at every
# opt step + round to plan_trace.pkl, for visualizing how the search converges.
# On by default; set enabled=false to skip (then planner runs byte-identically).
trace:
  enabled: true
  dtype: float16

objective:
  _target_: planning.objectives.create_objective_fn
  alpha: 0
  base: 2
  mode: last
  invert: false        # set true for avoid-goal style tasks

# Success: mode=default = reach (pos_dist<0.5); mode=avoid = geodesic avoid-goal.
# avoid knobs (margin/frac) live in conf/task/avoid_goal.yaml.
success:
  mode: default

# Planner now comes from the `planner` config group (defaults: planner=mpc_cem).
# Select another at CLI: `planner=gd` / `planner=mpc_gd` / `planner=cem` -> full replace.

# Maze layout. Override at CLI: `python plan.py setting=medium`.
setting: u_maze

# Variant axis (baseline = no overrides; otherwise pick a type + name).
# Override at CLI: `setting=u_maze variant_type=color variant=purpleball`.
variant_type: baseline
variant: baseline

# env_id_map: nested by setting → variant_type → variant → registered gym env id.
# (baseline lives directly under setting, no variant_type/variant level.)
env_id_map:
  u_maze:
    baseline: maze2d-umaze-v1
    color:
      purpleball: maze2d-umaze-purpleball-v1
      graywall:   maze2d-umaze-graywall-v1
      whitefloor: maze2d-umaze-whitefloor-v1
      all:        maze2d-umaze-all-v1
    task:
      avoid_goal: maze2d-umaze-avoidgoal-v1
  u_maze_eval:
    baseline: maze2d-eval-umaze-v1
  medium:
    baseline: maze2d-medium-v1
  medium_eval:
    baseline: maze2d-eval-medium-v1
  large:
    baseline: maze2d-large-v1
  large_eval:
    baseline: maze2d-eval-large-v1
  small:
    baseline: maze2d-small-v0
  open:
    baseline: maze2d-open-v0
  # 5x5 held-out unseen test mazes (diversity/quantity pool); see env/pointmaze/mazes_5x5.py
  cornermaze:
    baseline: maze2d-5x5-cornermaze-v0
  jmaze:
    baseline: maze2d-5x5-jmaze-v0
  pmaze:
    baseline: maze2d-5x5-pmaze-v0
  rzmaze:
    baseline: maze2d-5x5-rzmaze-v0
  vmaze:
    baseline: maze2d-5x5-vmaze-v0