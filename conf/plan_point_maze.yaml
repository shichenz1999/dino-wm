defaults:
  - _self_
  # - override hydra/launcher: submitit_slurm

hydra:
  run:
    dir: plan_outputs/${now:%Y%m%d%H%M%S}_${replace_slash:${model_name}}_${setting}_gH${goal_H}
  sweep:
    dir: plan_outputs/${now:%Y%m%d%H%M%S}_${replace_slash:${model_name}}_${setting}_gH${goal_H}
    subdir: ${hydra.job.num}
  # launcher:
  #   submitit_folder: ${hydra.sweep.dir}/.submitit/%j
  #   nodes: 1
  #   tasks_per_node: 1
  #   cpus_per_task: 16
  #   mem_gb: 256
  #   gres: "gpu:h100:1"
  #   qos: "explore"
  #   timeout_min: 720
  #   setup: ["export DEBUGVAR=$(scontrol show hostnames $SLURM_JOB_NODELIST)",
  #           export MASTER_ADDR="$(scontrol show hostnames $SLURM_JOB_NODELIST | head -n 1)",
  #           "export MASTER_PORT=$(for port in $(shuf -i 30000-65500 -n 20); do if [[ $(netstat -tupln 2>&1 | grep $port | wc -l) -eq 0 ]] ; then echo $port; break; fi; done;)",]

# model to load for planning
ckpt_base_path: ./checkpoints # put absolute path here. Checkpoints will be loaded from ${ckpt_base_path}/outputs
model_name: null
model_epoch: latest

seed: 99
n_evals: 50 
goal_source: 'random_state'
goal_H: 5 
n_plot_samples: 10

debug_dset_init: False

objective:
  _target_: planning.objectives.create_objective_fn
  alpha: 0
  base: 2 
  mode: last

planner:
  _target_: planning.mpc.MPCPlanner
  max_iter: 10
  n_taken_actions: 5
  sub_planner:
    target: planning.cem.CEMPlanner
    horizon: 5
    topk: 10
    num_samples: 100
    var_scale: 1
    opt_steps: 10
    eval_every: 1
  name: mpc_cem

# Maze variant to plan on. Override at CLI: `python plan.py setting=medium`.
# env_id_map: setting → registered gym env id (in env/pointmaze/__init__.py)
setting: u_maze
env_id_map:
  u_maze:        maze2d-umaze-v1
  u_maze_eval:   maze2d-eval-umaze-v1
  medium:        maze2d-medium-v1
  medium_eval:   maze2d-eval-medium-v1
  large:         maze2d-large-v1
  large_eval:    maze2d-eval-large-v1
  small:         maze2d-small-v0
  open:          maze2d-open-v0