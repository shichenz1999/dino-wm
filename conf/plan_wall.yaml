defaults:
  - _self_
  - planner: mpc_cem     # planner config GROUP -> `planner=gd` REPLACES (no merge leftover)
  - override hydra/launcher: submitit_slurm

hydra:
  run:
    dir: ${results_base_path}/${env_name}/eval/${replace_slash:${ckpt_id}}/${now:%Y%m%d%H%M%S}
  sweep:
    dir: ${results_base_path}/${env_name}/eval/${replace_slash:${ckpt_id}}/${now:%Y%m%d%H%M%S}
    subdir: ${hydra.job.num}
  launcher:
    submitit_folder: ${hydra.sweep.dir}/.submitit/%j
    nodes: 1
    tasks_per_node: 1
    cpus_per_task: 16
    mem_gb: 256
    gres: "gpu:h100:1"
    qos: "explore"
    timeout_min: 720
    setup: ["export DEBUGVAR=$(scontrol show hostnames $SLURM_JOB_NODELIST)",
            export MASTER_ADDR="$(scontrol show hostnames $SLURM_JOB_NODELIST | head -n 1)",
            "export MASTER_PORT=$(for port in $(shuf -i 30000-65500 -n 20); do if [[ $(netstat -tupln 2>&1 | grep $port | wc -l) -eq 0 ]] ; then echo $port; break; fi; done;)",]

# model to load for planning
ckpt_base_path: ./checkpoints   # put absolute path here. Checkpoint loaded from ${ckpt_base_path}/${env_name}/${ckpt_id}
results_base_path: ../results        # plan outputs go to ${results_base_path}/${env_name}/eval/${ckpt_id}/...
env_name: null
ckpt_id: null
model_epoch: latest

seed: 99
n_evals: 50
goal_source: 'random_state'
goal_H: 5 
n_plot_samples: 10

debug_dset_init: False

objective:
  _target_: planning.objectives.create_objective_fn
  alpha: 1
  base: 2 
  mode: last

