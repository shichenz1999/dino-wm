_target_: planning.gd.GDPlanner
horizon: 5
action_noise: 0.003
sample_type: 'randn' # 'zero' or 'randn'
lr: 1               # sgd: 1 (default); adam/adamw: try ~0.01-0.1
opt_steps: 1000
eval_every: 10
optimizer: sgd      # sgd (default, = original behavior) | adam | adamw
use_cosine_scheduler: false
scheduler_eta_min: 0.0
adamw_weight_decay: 0.01

name: gd